version: "3.9"

services:
  django:
    build: .
    container_name: django_app
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - redis

  celery_worker:
    build: .
    container_name: celery_worker
    command: celery -A Arbitrium_CS worker -l info
    volumes:
      - .:/app
    depends_on:
      - redis

  celery_beat:
    build: .
    container_name: celery_beat
    command: celery -A Arbitrium_CS beat -l info
    volumes:
      - .:/app
    depends_on:
      - redis

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
